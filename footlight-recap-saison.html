<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FootLight — Récap de ma saison</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --blue:#1f6feb;--blue-l:#79c0ff;
  --gold:#d29922;--gold-l:#e3b341;
  --green:#238636;--green-l:#56d364;
  --red:#da3633;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#0d1117ee;backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.2rem;font-weight:800;background:linear-gradient(90deg,#79c0ff,#e3b341);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-links{display:flex;gap:16px;align-items:center;}
.nav-links a{font-size:0.85rem;color:var(--muted);text-decoration:none;cursor:pointer;}
.nav-links a:hover{color:var(--text);}

.page{max-width:820px;margin:0 auto;padding:76px 24px 60px;}

.loading{text-align:center;padding:80px 20px;color:var(--muted);}
.loading-spin{width:40px;height:40px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--blue);animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

.hero{background:linear-gradient(135deg,rgba(31,111,235,0.15),rgba(210,153,34,0.1));border:1px solid var(--border);border-radius:18px;padding:32px;margin-bottom:20px;text-align:center;}
.hero-eyebrow{font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--gold-l);font-weight:700;margin-bottom:8px;}
.hero-name{font-size:1.8rem;font-weight:900;margin-bottom:6px;}
.hero-sub{font-size:0.9rem;color:var(--muted);}

.season-select-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;justify-content:center;}
.season-select-row label{font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.season-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-size:1.6rem;font-weight:800;margin-bottom:4px;}
.stat-lbl{font-size:0.72rem;color:var(--muted);}

.ratio-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media(max-width:600px){.ratio-grid{grid-template-columns:1fr;}}
.ratio-card{border-radius:14px;padding:18px;text-align:center;border:1px solid;position:relative;cursor:help;}
.ratio-card.gold{background:rgba(210,153,34,0.1);border-color:rgba(210,153,34,0.35);}
.ratio-card.blue{background:rgba(31,111,235,0.1);border-color:rgba(31,111,235,0.35);}
.ratio-card.elite{background:rgba(218,54,51,0.14);border-color:var(--red);border-width:2px;}
.ratio-card.empty{background:var(--bg3);border-color:var(--bg4);opacity:0.6;}
.ratio-val{font-size:2rem;font-weight:900;margin-bottom:4px;}
.ratio-card.gold .ratio-val{color:var(--gold-l);}
.ratio-card.blue .ratio-val{color:var(--blue-l);}
.ratio-card.elite .ratio-val{color:var(--red);}
.ratio-card.empty .ratio-val{color:var(--muted);}
.ratio-lbl{font-size:0.78rem;color:var(--muted);font-weight:600;}
.ratio-badge{position:absolute;top:-9px;right:12px;background:var(--red);color:#fff;font-size:0.62rem;font-weight:800;padding:2px 9px;border-radius:20px;letter-spacing:0.3px;}

.section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.section-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:0.85rem;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--muted);}
.info-val{font-weight:500;}

.progress-track{background:var(--bg3);border-radius:6px;height:10px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;background:var(--blue);border-radius:6px;}

.highlight-box{background:rgba(210,153,34,0.08);border:1px solid rgba(210,153,34,0.25);border-radius:12px;padding:16px;}
.highlight-box .hb-title{font-size:0.78rem;color:var(--gold-l);font-weight:700;margin-bottom:6px;}

.btn-row{display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap;}
.btn{padding:10px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn.primary{background:var(--blue);color:#fff;}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;}
.btn:hover{opacity:0.85;}

.not-found{text-align:center;padding:80px 20px;}
.not-found h2{font-size:1.4rem;margin-bottom:10px;}
.not-found p{color:var(--muted);margin-bottom:20px;}

@media print{
  nav,.no-print{display:none !important;}
  body{background:#fff !important;color:#111 !important;}
  .page{padding:10px 0;max-width:100%;}
  .hero,.section,.stat-card,.ratio-card{background:#fff !important;border:1px solid #ccc !important;}
  .hero-name,.stat-val,.info-val,.ratio-val{color:#111 !important;}
  .info-key,.stat-lbl,.section-title,.ratio-lbl{color:#555 !important;}
  .progress-track{background:#eee !important;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">FootLight</a>
  <div class="nav-links">
    <a href="footlight-espace.html">Mon espace</a>
    <a href="footlight-profil.html">Mon profil</a>
  </div>
</nav>

<div class="page">
  <div class="loading" id="loading">
    <div class="loading-spin"></div>
    <p>Chargement de ton récap...</p>
  </div>

  <div id="recap-content" style="display:none;"></div>

  <div class="not-found" id="not-found" style="display:none;">
    <h2>Aucun profil joueur</h2>
    <p>Connecte-toi avec ton compte joueur pour voir ton récap de saison.</p>
    <a href="footlight-connexion.html"><button class="btn primary">Se connecter</button></a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://migarohddystlyhuoxfg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pZ2Fyb2hkZHlzdGx5aHVveGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjI2NjksImV4cCI6MjA5Mjk5ODY2OX0.NKlySSVpnws5WZF41T2qeoMjBi5VZzpnk_h-ejTj9R4';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const POSTES_DEFENSIFS = ['gardien','defenseur_central','lateral_droit','lateral_gauche','milieu_defensif'];
const POSTES_MILIEU = ['milieu_central','milieu_offensif','milieu_gauche'];

function evolutionTier(pct) {
  if (pct > 15) return { color: 'var(--green-l)', label: '🟢 Progression' };
  if (pct >= -15) return { color: 'var(--green-l)', label: '🟢 Stable — bonne adaptabilité' };
  if (pct >= -45) return { color: 'var(--gold-l)', label: '🟠 Baisse notable — niveau plus élevé ou changement de contexte à vérifier' };
  return { color: 'var(--red)', label: '🔴 Grosse baisse — à examiner de près' };
}

function impactTier(diff) {
  if (diff > 0.30) return { color: 'var(--green-l)', label: '🟢 Très fort signal — l\'équipe est nettement plus performante avec lui' };
  if (diff >= 0.10) return { color: 'var(--gold-l)', label: '🟡 Impact léger mais positif' };
  if (diff >= -0.10) return { color: 'var(--muted)', label: '⚪ Profil neutre — ne change pas grand-chose' };
  return { color: 'var(--red)', label: '🔴 L\'équipe est moins performante avec lui — à surveiller' };
}

function ratioTierClass(rawValue, tiers, invert) {
  if (rawValue == null) return 'empty';
  let cls = 'blue';
  if (invert) {
    if (rawValue <= tiers.elite) cls = 'elite';
    else if (rawValue <= tiers.gold) cls = 'gold';
  } else {
    if (rawValue >= tiers.elite) cls = 'elite';
    else if (rawValue >= tiers.gold) cls = 'gold';
  }
  return cls;
}
const TIER_WEIGHT = { elite: 2, gold: 1, blue: 0, empty: -1 };

function ratioCard(displayVal, label, rawValue, tiers, invert, title) {
  const cls = ratioTierClass(rawValue, tiers, invert);
  const badge = cls === 'elite' ? '<div class="ratio-badge">💪 Point fort</div>' : '';
  return `<div class="ratio-card ${cls}" title="${title||''}">${badge}<div class="ratio-val">${displayVal != null ? displayVal : '—'}</div><div class="ratio-lbl">${label}</div></div>`;
}

function ratioCardSorted(entries) {
  return entries
    .map(e => ({ weight: e.pinned ? 99 : TIER_WEIGHT[ratioTierClass(e.rawValue, e.tiers, e.invert)], html: ratioCard(e.displayVal, e.label, e.rawValue, e.tiers, e.invert, e.title) }))
    .sort((a, b) => b.weight - a.weight)
    .map(e => e.html)
    .join('');
}

function normalizeName(s) {
  return (s || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().trim().replace(/\s+/g, ' ');
}

async function findOwnJoueur(user) {
  const { data: exact } = await db.from('joueurs').select('*').eq('email', user.email).single();
  if (exact) return exact;

  const prenom = user.user_metadata && user.user_metadata.prenom;
  const nom = user.user_metadata && user.user_metadata.nom;
  if (!prenom || !nom) return null;

  const { data: candidates } = await db.from('joueurs').select('*').neq('email', user.email).limit(1000);
  if (!candidates) return null;
  const np = normalizeName(prenom), nn = normalizeName(nom);
  const match = candidates.find(c => normalizeName(c.prenom) === np && normalizeName(c.nom) === nn);
  return match || null;
}

let joueur = null;
let seasonsData = [];
let matchsAll = [];

async function init() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('not-found').style.display = 'block';
    return;
  }

  joueur = await findOwnJoueur(user);
  if (!joueur) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('not-found').style.display = 'block';
    return;
  }

  const { data: historiqueRaw } = await db.from('stats_saisons').select('*').eq('joueur_id', joueur.id).order('saison', { ascending: false });
  const historique = historiqueRaw || [];

  const currentSeason = {
    saison: joueur.saison || '2026-2027', isCurrent: true,
    club: joueur.club, niveau: joueur.niveau,
    matchs_joues: joueur.matchs_joues, matchs_equipe: joueur.matchs_equipe, titularisations: joueur.titularisations,
    buts: joueur.buts, passes_decisives: joueur.passes_decisives, buts_equipe: joueur.buts_equipe,
    pct_matchs_avec_but: joueur.pct_matchs_avec_but,
    buts_encaisses_avec: joueur.buts_encaisses_avec, clean_sheets: joueur.clean_sheets, buts_encaisses_equipe: joueur.buts_encaisses_equipe,
    minutes_jouees: joueur.minutes_jouees,
    cartons_jaunes: joueur.cartons_jaunes, cartons_rouges: joueur.cartons_rouges,
  };
  seasonsData = [currentSeason, ...historique].sort((a,b) => (b.saison||'').localeCompare(a.saison||''));

  const { data: matchsRaw } = await db.from('matchs_joueur').select('*').eq('joueur_id', joueur.id).order('date_match', { ascending: false });
  matchsAll = matchsRaw || [];

  populateSeasonSelect();
  renderRecap(currentSeason.saison);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('recap-content').style.display = 'block';
}

function populateSeasonSelect() {
  const html = seasonsData.length > 1 ? `
    <div class="season-select-row no-print">
      <label for="season-select">Saison</label>
      <select id="season-select" class="season-select" onchange="renderRecap(this.value)">
        ${seasonsData.map(s => `<option value="${s.saison}" ${s.isCurrent?'selected':''}>${s.saison}${s.isCurrent?' (actuelle)':''}</option>`).join('')}
      </select>
    </div>` : '';
  document.getElementById('recap-content').dataset.selectHtml = html;
}

function renderRecap(saison) {
  const s = seasonsData.find(x => x.saison === saison) || seasonsData[0];
  const isDefensif = POSTES_DEFENSIFS.includes(joueur.poste || 'autre');
  const matchs = matchsAll.filter(m => m.saison === s.saison);
  const pct_tps = s.matchs_joues > 0 ? Math.round((s.minutes_jouees||0) / (s.matchs_joues * 90) * 100) : 0;
  const ratioButsMatch = s.matchs_joues > 0 ? (s.buts||0) / s.matchs_joues : null;
  const contribution = (s.buts||0) + (s.passes_decisives||0);
  const ratioMinBut = (s.buts > 0) ? Math.round((s.minutes_jouees||0) / s.buts) : null;
  const pctButsEquipe = (s.buts_equipe > 0) ? Math.round((s.buts||0) / s.buts_equipe * 100) : null;
  const matchsAvecButCount = matchs.filter(m => (m.buts||0) > 0).length;
  const pctMatchsAvecBut = matchs.length > 0
    ? Math.round(matchsAvecButCount / matchs.length * 100)
    : (s.pct_matchs_avec_but != null ? Math.round(s.pct_matchs_avec_but) : null);
  const ratioEncaissesMatch = (s.matchs_joues > 0 && s.buts_encaisses_avec != null) ? s.buts_encaisses_avec / s.matchs_joues : null;
  const pctCleanSheet = (s.titularisations > 0 && s.clean_sheets != null) ? Math.round(s.clean_sheets / s.titularisations * 100) : null;
  const ratioCartons = s.matchs_joues > 0 ? ((s.cartons_jaunes||0) + (s.cartons_rouges||0)) / s.matchs_joues : null;
  const tauxPresence = (s.matchs_equipe > 0) ? Math.round((s.matchs_joues||0) / s.matchs_equipe * 100) : null;
  const matchsSansLui = (s.matchs_equipe > 0) ? s.matchs_equipe - (s.matchs_joues||0) : null;
  const butsEncaissesSansLui = (s.buts_encaisses_equipe != null && s.buts_encaisses_avec != null) ? s.buts_encaisses_equipe - s.buts_encaisses_avec : null;
  const ratioEncaissesSansLui = (matchsSansLui > 0 && butsEncaissesSansLui != null) ? butsEncaissesSansLui / matchsSansLui : null;
  const impactDefReel = (ratioEncaissesMatch != null && ratioEncaissesSansLui != null) ? ratioEncaissesSansLui - ratioEncaissesMatch : null;
  const sIndex = seasonsData.findIndex(x => x.saison === s.saison);
  // Remonte jusqu'à 3 saisons en arrière pour trouver la plus proche avec
  // des matchs joués, plutôt que d'échouer si la saison juste avant n'a
  // pas de données exploitables.
  let prevSeason = null;
  if (sIndex >= 0) {
    for (let i = sIndex + 1; i <= sIndex + 3 && i < seasonsData.length; i++) {
      if (seasonsData[i] && seasonsData[i].matchs_joues > 0) { prevSeason = seasonsData[i]; break; }
    }
  }
  const prevRatioButsMatch = (prevSeason && prevSeason.matchs_joues > 0) ? (prevSeason.buts||0) / prevSeason.matchs_joues : null;
  const evolutionPct = (ratioButsMatch != null && prevRatioButsMatch > 0) ? Math.round((ratioButsMatch - prevRatioButsMatch) / prevRatioButsMatch * 100) : null;
  const prevRatioMinBut = (prevSeason && prevSeason.buts > 0) ? Math.round((prevSeason.minutes_jouees||0) / prevSeason.buts) : null;
  const minButEvolutionPct = (ratioMinBut != null && prevRatioMinBut > 0) ? Math.round((prevRatioMinBut - ratioMinBut) / prevRatioMinBut * 100) : null;
  const prevMatchsSaison = prevSeason ? matchsAll.filter(m => m.saison === prevSeason.saison) : [];
  const prevPctMatchsAvecBut = prevMatchsSaison.length > 0
    ? Math.round(prevMatchsSaison.filter(m => (m.buts||0) > 0).length / prevMatchsSaison.length * 100)
    : (prevSeason && prevSeason.pct_matchs_avec_but != null ? Math.round(prevSeason.pct_matchs_avec_but) : null);
  const pctMatchsEvolutionPct = (pctMatchsAvecBut != null && prevPctMatchsAvecBut > 0) ? Math.round((pctMatchsAvecBut - prevPctMatchsAvecBut) / prevPctMatchsAvecBut * 100) : null;
  const prevRatioEncaissesMatch = (prevSeason && prevSeason.matchs_joues > 0 && prevSeason.buts_encaisses_avec != null) ? prevSeason.buts_encaisses_avec / prevSeason.matchs_joues : null;
  const encaissesEvolutionPct = (ratioEncaissesMatch != null && prevRatioEncaissesMatch > 0) ? Math.round((prevRatioEncaissesMatch - ratioEncaissesMatch) / prevRatioEncaissesMatch * 100) : null;
  const prevPctCleanSheet = (prevSeason && prevSeason.titularisations > 0 && prevSeason.clean_sheets != null) ? Math.round(prevSeason.clean_sheets / prevSeason.titularisations * 100) : null;
  const cleanSheetEvolutionPct = (pctCleanSheet != null && prevPctCleanSheet > 0) ? Math.round((pctCleanSheet - prevPctCleanSheet) / prevPctCleanSheet * 100) : null;

  let meilleurMatch = null;
  if (matchs.length) {
    if (isDefensif) {
      meilleurMatch = [...matchs].sort((a,b) => {
        if (!!b.clean_sheet !== !!a.clean_sheet) return (b.clean_sheet?1:0) - (a.clean_sheet?1:0);
        return (a.buts_encaisses_avec ?? 99) - (b.buts_encaisses_avec ?? 99);
      })[0];
    } else {
      meilleurMatch = [...matchs].sort((a,b) => ((b.buts||0)+(b.passes_decisives||0)) - ((a.buts||0)+(a.passes_decisives||0)))[0];
    }
  }

  const loggedPct = s.matchs_joues > 0 ? Math.min(100, Math.round(matchs.length / s.matchs_joues * 100)) : 0;

  const html = `
    ${document.getElementById('recap-content').dataset.selectHtml || ''}

    <div class="hero">
      <div class="hero-eyebrow">Récap de saison</div>
      <div class="hero-name">${joueur.prenom} ${joueur.nom}</div>
      <div class="hero-sub">${s.saison}${s.isCurrent?' (en cours)':''} · ${s.club||'—'} · ${(s.niveau||'—')}</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${s.matchs_joues||0}</div><div class="stat-lbl">Matchs joués</div></div>
      ${isDefensif ? `
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${s.buts_encaisses_avec ?? '—'}</div><div class="stat-lbl">Buts encaissés</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green-l)">${s.clean_sheets ?? '—'}</div><div class="stat-lbl">Clean sheets</div></div>
      ` : `
      <div class="stat-card"><div class="stat-val" style="color:var(--green-l)">${s.buts||0}</div><div class="stat-lbl">Buts</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--blue-l)">${s.passes_decisives||0}</div><div class="stat-lbl">Passes déc.</div></div>
      `}
      <div class="stat-card"><div class="stat-val">${pct_tps}%</div><div class="stat-lbl">Temps de jeu</div></div>
    </div>

    ${(isDefensif && impactDefReel != null) ? `
    <div class="section">
      <div class="section-title">Impact défensif réel</div>
      <div class="info-row"><span class="info-key">Matchs de l'équipe (saison)</span><span class="info-val">${s.matchs_equipe}</span></div>
      <div class="info-row"><span class="info-key">Buts encaissés par l'équipe (saison)</span><span class="info-val">${s.buts_encaisses_equipe}</span></div>
      <div class="info-row"><span class="info-key">Matchs sans lui</span><span class="info-val">${matchsSansLui} · ${butsEncaissesSansLui} but${butsEncaissesSansLui>1?'s':''} encaissé${butsEncaissesSansLui>1?'s':''}</span></div>
      <div class="info-row" style="margin-top:6px;"><span class="info-key">Buts encaissés/match avec lui</span><span class="info-val">${ratioEncaissesMatch.toFixed(2)}</span></div>
      <div class="info-row"><span class="info-key">Buts encaissés/match sans lui</span><span class="info-val">${ratioEncaissesSansLui.toFixed(2)}</span></div>
      <div style="margin-top:10px;"><span style="font-size:0.85rem;font-weight:700;color:${impactTier(impactDefReel).color}">${impactDefReel>=0?'+':''}${impactDefReel.toFixed(2)}</span></div>
      <div style="font-size:0.78rem;color:${impactTier(impactDefReel).color};margin-top:4px;">${impactTier(impactDefReel).label}</div>
    </div>` : ''}

    <div class="section">
      <div class="section-title">Ratios & performance</div>
      <div class="ratio-grid">
        ${isDefensif ? ratioCardSorted([
          { displayVal: ratioEncaissesMatch != null ? ratioEncaissesMatch.toFixed(2) : null, label: 'Buts encaissés / match', rawValue: ratioEncaissesMatch, tiers: {elite:0.5, gold:1.0}, invert: true, title: 'En moyenne, nombre de buts encaissés par l\'équipe à chaque match où il joue.' },
          { displayVal: pctCleanSheet != null ? pctCleanSheet+'%' : null, label: '% clean sheet (titularisations)', rawValue: pctCleanSheet, tiers: {elite:40, gold:30}, invert: false, title: 'Pourcentage de ses titularisations où l\'équipe n\'a encaissé aucun but.' },
          { displayVal: ratioCartons != null ? ratioCartons.toFixed(2) : null, label: 'Cartons / match (discipline)', rawValue: ratioCartons, tiers: {elite:0.15, gold:0.30}, invert: true, title: 'En moyenne, nombre de cartons (jaunes + rouges) reçus par match joué.' },
          { displayVal: tauxPresence != null ? tauxPresence+'%' : null, label: 'Taux de présence', rawValue: tauxPresence, tiers: {elite:85, gold:60}, invert: false, title: 'Pourcentage des matchs de l\'équipe cette saison où il a été utilisé.' },
        ]) : ratioCardSorted([
          { displayVal: ratioButsMatch != null ? ratioButsMatch.toFixed(2) : null, label: 'Buts / match (moyenne)', rawValue: ratioButsMatch, tiers: {elite:0.7, gold:0.4}, invert: false, title: 'En moyenne, nombre de buts marqués par match joué (total buts ÷ matchs joués).' },
          { displayVal: pctMatchsAvecBut != null ? pctMatchsAvecBut+'%' : null, label: matchs.length > 0 ? `A marqué dans ${matchsAvecButCount} match${matchsAvecButCount>1?'s':''} sur ${matchs.length}` : '% matchs avec but', rawValue: pctMatchsAvecBut, tiers: {elite:65, gold:40}, invert: false, title: matchs.length > 0 ? 'Nombre de matchs (avec fiche remplie) où il a marqué au moins un but, sur le total de matchs loggés — peu importe combien de buts par match.' : 'Pourcentage des matchs où il a marqué au moins un but (donnée historique importée, en l\'absence de fiches de match).' },
          { displayVal: ratioMinBut != null ? ratioMinBut+"'" : null, label: ratioMinBut != null ? `Marque toutes les ${ratioMinBut} min (moyenne)` : 'Minutes par but (moyenne)', rawValue: ratioMinBut, tiers: {elite:100, gold:200}, invert: true, title: 'En moyenne, nombre de minutes de jeu nécessaires pour marquer un but.' },
          { displayVal: contribution, label: 'Buts + passes décisives', rawValue: s.matchs_joues > 0 ? contribution / s.matchs_joues : null, tiers: {elite:1.0, gold:0.6}, invert: false, always: true, pinned: POSTES_MILIEU.includes(joueur.poste || 'autre'), title: 'Total de buts marqués et passes décisives sur la saison.' },
          { displayVal: pctButsEquipe != null ? pctButsEquipe+'%' : null, label: "Part des buts de l'équipe", rawValue: pctButsEquipe, tiers: {elite:35, gold:20}, invert: false, title: 'Pourcentage des buts de l\'équipe qu\'il a marqués lui-même.' },
          { displayVal: tauxPresence != null ? tauxPresence+'%' : null, label: 'Taux de présence', rawValue: tauxPresence, tiers: {elite:85, gold:60}, invert: false, title: 'Pourcentage des matchs de l\'équipe cette saison où il a été utilisé.' },
        ])}
      </div>
    </div>

    ${(isDefensif ? (encaissesEvolutionPct != null || cleanSheetEvolutionPct != null) : (evolutionPct != null || pctMatchsEvolutionPct != null || minButEvolutionPct != null)) ? `
    <div class="section">
      <div class="section-title">Évolution vs saison précédente</div>
      ${isDefensif ? `
      ${encaissesEvolutionPct != null ? `
      <div class="info-row"><span class="info-key">Buts encaissés/match : ${prevRatioEncaissesMatch.toFixed(2)} (${prevSeason.saison}) → ${ratioEncaissesMatch.toFixed(2)} (${s.saison})</span><span class="info-val" style="color:${evolutionTier(encaissesEvolutionPct).color}">${encaissesEvolutionPct>=0?'+':''}${encaissesEvolutionPct}%</span></div>
      <div style="font-size:0.78rem;color:${evolutionTier(encaissesEvolutionPct).color};margin-bottom:8px;">${evolutionTier(encaissesEvolutionPct).label}</div>` : ''}
      ${cleanSheetEvolutionPct != null ? `
      <div class="info-row"><span class="info-key">% clean sheet : ${prevPctCleanSheet}% (${prevSeason.saison}) → ${pctCleanSheet}% (${s.saison})</span><span class="info-val" style="color:${evolutionTier(cleanSheetEvolutionPct).color}">${cleanSheetEvolutionPct>=0?'+':''}${cleanSheetEvolutionPct}%</span></div>
      <div style="font-size:0.78rem;color:${evolutionTier(cleanSheetEvolutionPct).color};margin-bottom:8px;">${evolutionTier(cleanSheetEvolutionPct).label}</div>` : ''}
      ` : `
      ${evolutionPct != null ? `
      <div class="info-row"><span class="info-key">Buts/match : ${prevRatioButsMatch.toFixed(2)} (${prevSeason.saison}) → ${ratioButsMatch.toFixed(2)} (${s.saison})</span><span class="info-val" style="color:${evolutionTier(evolutionPct).color}">${evolutionPct>=0?'+':''}${evolutionPct}%</span></div>
      <div style="font-size:0.78rem;color:${evolutionTier(evolutionPct).color};margin-bottom:8px;">${evolutionTier(evolutionPct).label}</div>` : ''}
      ${pctMatchsEvolutionPct != null ? `
      <div class="info-row"><span class="info-key">% matchs avec but : ${prevPctMatchsAvecBut}% (${prevSeason.saison}) → ${pctMatchsAvecBut}% (${s.saison})</span><span class="info-val" style="color:${evolutionTier(pctMatchsEvolutionPct).color}">${pctMatchsEvolutionPct>=0?'+':''}${pctMatchsEvolutionPct}%</span></div>
      <div style="font-size:0.78rem;color:${evolutionTier(pctMatchsEvolutionPct).color};margin-bottom:8px;">${evolutionTier(pctMatchsEvolutionPct).label}</div>` : ''}
      ${minButEvolutionPct != null ? `
      <div class="info-row"><span class="info-key">Minutes par but : ${prevRatioMinBut}' (${prevSeason.saison}) → ${ratioMinBut}' (${s.saison})</span><span class="info-val" style="color:${evolutionTier(minButEvolutionPct).color}">${minButEvolutionPct>=0?'+':''}${minButEvolutionPct}%</span></div>
      <div style="font-size:0.78rem;color:${evolutionTier(minButEvolutionPct).color};margin-bottom:8px;">${evolutionTier(minButEvolutionPct).label}</div>` : ''}
      `}
      ${(prevSeason && s.niveau && prevSeason.niveau && s.niveau !== prevSeason.niveau) ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:6px;">Changement de niveau entre les deux saisons : ${prevSeason.niveau} → ${s.niveau}</div>` : ''}
    </div>` : ''}

    ${meilleurMatch ? `
    <div class="section">
      <div class="highlight-box">
        <div class="hb-title">⭐ Meilleur match de la saison</div>
        <div style="font-size:0.9rem;">
          ${meilleurMatch.date_match ? new Date(meilleurMatch.date_match).toLocaleDateString('fr-FR') + ' · ' : ''}${meilleurMatch.adversaire || 'Adversaire non précisé'}
          ${meilleurMatch.score_pour != null && meilleurMatch.score_contre != null ? ` (${meilleurMatch.score_pour}-${meilleurMatch.score_contre})` : ''}
        </div>
        <div style="font-size:0.8rem;color:var(--muted);margin-top:4px;">
          ${isDefensif
            ? (meilleurMatch.clean_sheet ? 'Clean sheet' : `${meilleurMatch.buts_encaisses_avec ?? 0} but(s) encaissé(s)`)
            : `${meilleurMatch.buts||0} but(s) · ${meilleurMatch.passes_decisives||0} passe(s) décisive(s)`}
        </div>
      </div>
    </div>` : ''}

    <div class="section">
      <div class="section-title">Suivi de saison</div>
      <div class="info-row"><span class="info-key">Fiches de match remplies</span><span class="info-val">${matchs.length}${s.matchs_joues ? ' / ' + s.matchs_joues : ''}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${loggedPct}%;"></div></div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:8px;">
        ${matchs.length === 0
          ? "Tu n'as pas encore ajouté de fiche de match cette saison — complète-les dans \"Modifier mon profil\" pour un récap plus riche."
          : loggedPct < 100
            ? "Continue à ajouter tes matchs pour un récap encore plus complet."
            : "Bravo, tu as loggé tous tes matchs de la saison !"}
      </div>
    </div>

    ${(joueur.points_forts && joueur.points_forts.length) ? `
    <div class="section">
      <div class="section-title">Points forts</div>
      ${joueur.points_forts.map(p => `
      <div class="info-row">
        <span class="info-key">${p.label}</span>
        ${p.video_url ? `<a href="${p.video_url}" target="_blank" style="color:var(--blue-l);font-size:0.82rem;">🎥 Voir la vidéo →</a>` : `<span class="info-val">—</span>`}
      </div>`).join('')}
    </div>` : ''}

    ${joueur.points_amelioration ? `
    <div class="section">
      <div class="section-title">Points d'amélioration</div>
      <div style="font-size:0.85rem;color:var(--muted);line-height:1.6;">${joueur.points_amelioration}</div>
    </div>` : ''}

    <div class="btn-row no-print">
      <button class="btn primary" onclick="window.print()">📄 Télécharger mon récap (PDF)</button>
      <a href="footlight-modifier-profil.html" class="btn outline">Ajouter mes matchs</a>
      <a href="footlight-espace.html" class="btn outline">Mon espace</a>
    </div>
  `;

  document.getElementById('recap-content').innerHTML = html;
}

init();
</script>
</body>
</html>
