<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FootLight — Profil joueur</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --blue:#1f6feb;--blue-l:#79c0ff;
  --gold:#d29922;--gold-l:#e3b341;
  --green:#238636;--green-l:#56d364;
  --red:#da3633;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#0d1117ee;backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.2rem;font-weight:800;background:linear-gradient(90deg,#79c0ff,#e3b341);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-links{display:flex;gap:16px;align-items:center;}
.nav-links a{font-size:0.85rem;color:var(--muted);text-decoration:none;cursor:pointer;}
.nav-links a:hover{color:var(--text);}

.page{max-width:900px;margin:0 auto;padding:76px 24px 60px;}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--muted);}
.loading-spin{width:40px;height:40px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--blue);animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Header profil */
.profile-header{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px;display:flex;gap:20px;align-items:flex-start;}
.profile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:#fff;flex-shrink:0;}
.profile-name{font-size:1.6rem;font-weight:800;margin-bottom:6px;}
.profile-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.tag{font-size:0.75rem;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.tag.blue{border-color:var(--blue);color:var(--blue-l);}
.tag.green{border-color:var(--green);color:var(--green-l);}
.tag.gold{border-color:var(--gold);color:var(--gold-l);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-size:1.6rem;font-weight:800;margin-bottom:4px;}
.stat-lbl{font-size:0.72rem;color:var(--muted);}

.ratio-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media(max-width:600px){.ratio-grid{grid-template-columns:1fr;}}
.ratio-card{border-radius:14px;padding:18px;text-align:center;border:1px solid;position:relative;}
.ratio-card.gold{background:rgba(210,153,34,0.1);border-color:rgba(210,153,34,0.35);}
.ratio-card.blue{background:rgba(31,111,235,0.1);border-color:rgba(31,111,235,0.35);}
.ratio-card.elite{background:rgba(218,54,51,0.14);border-color:var(--red);border-width:2px;}
.ratio-val{font-size:2rem;font-weight:900;margin-bottom:4px;}
.ratio-card.gold .ratio-val{color:var(--gold-l);}
.ratio-card.blue .ratio-val{color:var(--blue-l);}
.ratio-card.elite .ratio-val{color:var(--red);}
.ratio-lbl{font-size:0.78rem;color:var(--muted);font-weight:600;}
.ratio-badge{position:absolute;top:-9px;right:12px;background:var(--red);color:#fff;font-size:0.62rem;font-weight:800;padding:2px 9px;border-radius:20px;letter-spacing:0.3px;}

/* Section */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.section-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:0.85rem;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--muted);}
.info-val{font-weight:500;}

/* Boutons */
.btn-row{display:flex;gap:10px;margin-top:16px;}
.btn{padding:10px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn.primary{background:var(--blue);color:#fff;}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn:hover{opacity:0.85;}

/* Not found */
.not-found{text-align:center;padding:80px 20px;}
.not-found h2{font-size:1.4rem;margin-bottom:10px;}
.not-found p{color:var(--muted);margin-bottom:20px;}

/* Impact / barres */
.bar-item{margin-bottom:14px;}
.bar-item:last-child{margin-bottom:0;}
.bar-label-row{display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:5px;}
.bar-label-row .k{color:var(--muted);}
.bar-label-row .v{font-weight:700;}
.bar-track{background:var(--bg3);border-radius:4px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}

/* Verrou plan */
.locked-box{background:rgba(31,111,235,0.06);border:1px solid rgba(31,111,235,0.2);border-radius:12px;padding:20px;text-align:center;}
.locked-box p{font-size:0.85rem;color:var(--blue-l);margin-bottom:12px;}

/* Sélecteur de saison */
.season-select-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.season-select-row label{font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.season-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;}
.season-select:focus{outline:1px solid var(--blue);}

/* Fiche imprimable / PDF */
@media print{
  nav,.no-print,.locked-box{display:none !important;}
  body{background:#fff !important;color:#111 !important;}
  .page{padding:10px 0;max-width:100%;}
  .profile-header,.section,.stat-card{background:#fff !important;border:1px solid #ccc !important;}
  .profile-name,.stat-val,.info-val{color:#111 !important;}
  .info-key,.stat-lbl,.muted,.section-title{color:#555 !important;}
  a{color:#111 !important;}
  .bar-track{background:#eee !important;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">FootLight</a>
  <div class="nav-links">
    <a href="index.html">Accueil</a>

    <a href="footlight-recherche.html"><button class="btn primary">Retour à la recherche</button></a>

</div>

<script>
const SUPABASE_URL = 'https://migarohddystlyhuoxfg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pZ2Fyb2hkZHlzdGx5aHVveGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjI2NjksImV4cCI6MjA5Mjk5ODY2OX0.NKlySSVpnws5WZF41T2qeoMjBi5VZzpnk_h-ejTj9R4';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const COULEURS = {
  'gardien':'#1f6feb','defenseur_central':'#da3633',
  'lateral_droit':'#8957e5','lateral_gauche':'#8957e5',
  'milieu_central':'#238636','milieu_offensif':'#238636',
  'milieu_defensif':'#238636','milieu_gauche':'#238636',
  'ailier_droit':'#d29922','ailier_gauche':'#d29922',
  'attaquant':'#d29922','autre':'#6e7681'
};

const BADGES = {
  'declaratif': '⚪ Déclaratif',
  'video': '🎥 Vérifié vidéo',
  'gps': '📍 Vérifié GPS',
  'elite': '⭐ Elite'
};

let viewerRole = 'anonyme'; // 'anonyme' | 'joueur' | 'recruteur' | 'nouveau'
let viewerPlan = 'free';

const POSTES_DEFENSIFS = ['gardien','defenseur_central','lateral_droit','lateral_gauche','milieu_defensif'];

// Colore un ratio/% selon son niveau réel plutôt qu'une couleur fixe :
// un attaquant qui marque 50% des buts de son équipe doit sauter aux yeux.
function ratioTierClass(rawValue, tiers, invert) {
  let cls = 'blue';
  if (rawValue != null) {
    if (invert) {
      if (rawValue <= tiers.elite) cls = 'elite';
      else if (rawValue <= tiers.gold) cls = 'gold';
    } else {
      if (rawValue >= tiers.elite) cls = 'elite';
      else if (rawValue >= tiers.gold) cls = 'gold';
    }
  }
  return cls;
}
const TIER_WEIGHT = { elite: 2, gold: 1, blue: 0 };

function ratioCard(displayVal, label, rawValue, tiers, invert) {
  const cls = ratioTierClass(rawValue, tiers, invert);
  const badge = cls === 'elite' ? '<div class="ratio-badge">💪 Point fort</div>' : '';
  return `<div class="ratio-card ${cls}">${badge}<div class="ratio-val">${displayVal}</div><div class="ratio-lbl">${label}</div></div>`;
}

// Construit les cartes de ratio puis les trie pour faire ressortir les
// points forts du joueur en premier plutôt qu'un ordre figé.
function ratioCardSorted(entries) {
  return entries
    .filter(e => e.rawValue != null || e.always)
    .map(e => ({ weight: TIER_WEIGHT[ratioTierClass(e.rawValue, e.tiers, e.invert)], html: ratioCard(e.displayVal, e.label, e.rawValue, e.tiers, e.invert) }))
    .sort((a, b) => b.weight - a.weight)
    .map(e => e.html)
    .join('');
}

// Compare le ratio buts/match entre deux saisons pour repérer une chute
// (changement de niveau, mauvais contexte) ou une progression.
function evolutionTier(pct) {
  if (pct > 15) return { color: 'var(--green-l)', label: '🟢 Progression' };
  if (pct >= -15) return { color: 'var(--green-l)', label: '🟢 Stable — bonne adaptabilité' };
  if (pct >= -45) return { color: 'var(--gold-l)', label: '🟠 Baisse notable — niveau plus élevé ou changement de contexte à vérifier' };
  return { color: 'var(--red)', label: '🔴 Grosse baisse — à examiner de près' };
}

// Lecture de l'impact collectif (différentiel de points/buts encaissés
// avec vs sans le joueur) par paliers, plutôt qu'un simple vert/rouge.
function impactTier(diff) {
  if (diff > 0.30) return { color: 'var(--green-l)', label: '🟢 Très fort signal — l\'équipe est nettement plus performante avec lui' };
  if (diff >= 0.10) return { color: 'var(--gold-l)', label: '🟡 Impact léger mais positif' };
  if (diff >= -0.10) return { color: 'var(--muted)', label: '⚪ Profil neutre — ne change pas grand-chose' };
  return { color: 'var(--red)', label: '🔴 L\'équipe est moins performante avec lui — à surveiller' };
}

function normalizeName(s) {
  return (s || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().trim().replace(/\s+/g, ' ');
}

// Si le joueur a changé son email de connexion (via footlight-modifier-profil.html)
// et l'a confirmé, sa fiche joueurs a encore l'ancien email : on la retrouve par
// nom et on la relie automatiquement au nouvel email.
async function findOwnJoueur(user) {
  const { data: exact } = await db.from('joueurs').select('*').eq('email', user.email).single();
  if (exact) return exact;

  const prenom = user.user_metadata && user.user_metadata.prenom;
  const nom = user.user_metadata && user.user_metadata.nom;
  if (!prenom || !nom) return null;

  const { data: candidates } = await db.from('joueurs').select('*').neq('email', user.email).limit(1000);
  if (!candidates) return null;
  const np = normalizeName(prenom), nn = normalizeName(nom);
  const match = candidates.find(c => normalizeName(c.prenom) === np && normalizeName(c.nom) === nn);
  if (!match) return null;

  const { data: relinked } = await db.from('joueurs').update({ email: user.email }).eq('id', match.id).select().single();
  return relinked || null;
}

async function loadProfil() {
  // Vérifier la session
  const { data: { user } } = await db.auth.getUser();
  let ownJoueur = null;
  if (user) {
    document.getElementById('nav-auth').textContent = 'Mon profil';
    document.getElementById('nav-auth').href = '#';

    const { data: recruteur } = await db.from('recruteurs').select('plan').eq('email', user.email).single();
    if (recruteur) {
      viewerRole = 'recruteur';
      viewerPlan = recruteur.plan || 'free';
    } else {
      ownJoueur = await findOwnJoueur(user);
      viewerRole = ownJoueur ? 'joueur' : 'nouveau';
    }
  }

  // Récupérer l'ID depuis l'URL
  const params = new URLSearchParams(window.location.search);
  const joueurId = params.get('id');
  const joueurNom = params.get('nom');

  if (!joueurId && !joueurNom) {
    // Si pas d'ID et connecté, charger son propre profil
    if (user && ownJoueur) {
      await renderProfil(ownJoueur, true); return;
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('not-found').style.display = 'block';
    return;
  }

  // Un compte joueur ne peut pas consulter le profil d'un autre joueur
  if (viewerRole === 'joueur') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('not-found').innerHTML = '<h2>🔒 Réservé aux recruteurs</h2><p>La consultation des profils joueurs est réservée aux comptes recruteur.</p><a href="footlight-espace.html"><button class="btn primary">Aller à mon espace</button></a>';
    document.getElementById('not-found').style.display = 'block';
    return;
  }

  // Chercher par nom si pas d'ID
  if (!joueurId && joueurNom) {
    const prenomParam = params.get('prenom');
    // Chercher sans filtre profil_public pour debug
    const { data, error } = await db
      .from('joueurs')
      .select('*')
      .ilike('nom', joueurNom)
      .ilike('prenom', prenomParam || '%')
      .limit(1);

    console.log('Recherche:', prenomParam, joueurNom, 'Résultat:', data, 'Erreur:', error);

    document.getElementById('loading').style.display = 'none';
    const joueur = data && data.length > 0 ? data[0] : null;
    if (!joueur) {
      document.getElementById('not-found').innerHTML = '<h2>Profil introuvable</h2><p>Recherche: ' + prenomParam + ' ' + joueurNom + '</p><p style="color:red">' + (error ? error.message : 'Aucun résultat') + '</p><a href="footlight-recherche.html"><button style="padding:10px 20px;background:#1f6feb;border:none;color:#fff;border-radius:8px;cursor:pointer;">Retour à la recherche</button></a>';
      document.getElementById('not-found').style.display = 'block';
      return;
    }
    await renderProfil(joueur, false);
    return;
  }

  // Charger le joueur par ID
  const { data: joueur, error } = await db.from('joueurs').select('*').eq('id', joueurId).single();

  document.getElementById('loading').style.display = 'none';

  if (error || !joueur) {
    document.getElementById('not-found').style.display = 'block';
    return;
  }

  await renderProfil(joueur, user && user.email === joueur.email);
}

async function renderProfil(j, isOwner) {
  const { data: historiqueRaw } = await db
    .from('stats_saisons')
    .select('*')
    .eq('joueur_id', j.id)
    .order('saison', { ascending: false });
  const historique = historiqueRaw || [];

  const { data: matchsRaw } = await db
    .from('matchs_joueur')
    .select('*')
    .eq('joueur_id', j.id)
    .order('date_match', { ascending: false });
  const matchsBySaison = {};
  (matchsRaw || []).forEach(m => {
    (matchsBySaison[m.saison] = matchsBySaison[m.saison] || []).push(m);
  });

  const poste_raw = j.poste || 'autre';
  const couleur = COULEURS[poste_raw] || '#6e7681';
  const initiales = ((j.prenom||'?')[0] + (j.nom||'?')[0]).toUpperCase();

  const canImpact = isOwner || (viewerRole === 'recruteur' && (viewerPlan === 'pro' || viewerPlan === 'premium'));
  const canGPS = isOwner || (viewerRole === 'recruteur' && viewerPlan === 'premium');
  const canExport = isOwner || (viewerRole === 'recruteur' && viewerPlan === 'premium');
  const canHistory = isOwner || (viewerRole === 'recruteur' && (viewerPlan === 'pro' || viewerPlan === 'premium'));
  const isDefensif = POSTES_DEFENSIFS.includes(poste_raw);

  // ── Saisons : saison actuelle (joueurs) + historique (stats_saisons) ──
  const currentSeason = {
    saison: j.saison || '2026-2027', club: j.club, niveau: j.niveau,
    matchs_joues: j.matchs_joues, matchs_equipe: j.matchs_equipe, titularisations: j.titularisations, buts: j.buts,
    passes_decisives: j.passes_decisives, minutes_jouees: j.minutes_jouees, buts_equipe: j.buts_equipe,
    cartons_jaunes: j.cartons_jaunes, cartons_rouges: j.cartons_rouges,
    impact_differentiel: j.impact_differentiel, pct_matchs_avec_but: j.pct_matchs_avec_but,
    points_avec: j.points_avec, points_sans: j.points_sans,
    pct_points_avec: j.pct_points_avec, pct_points_sans: j.pct_points_sans,
    vitesse_max_kmh: j.vitesse_max_kmh, vma_kmh: j.vma_kmh,
    distance_moyenne_km: j.distance_moyenne_km, sprints_match: j.sprints_match,
    buts_encaisses_avec: j.buts_encaisses_avec, clean_sheets: j.clean_sheets,
    preuve_gps_url: j.preuve_gps_url,
    isCurrent: true
  };
  const seasonsData = [currentSeason, ...historique].sort((a,b) => (b.saison||'').localeCompare(a.saison||''));

  const sumKey = (list,k) => list.reduce((a,s)=>a+(Number(s[k])||0),0);
  const avgKey = (list,k) => { const v = list.map(s=>s[k]).filter(x=>x!=null); return v.length ? v.reduce((a,b)=>a+Number(b),0)/v.length : null; };

  const globalSeason = {
    saison: 'global', isGlobal: true, nbSaisons: seasonsData.length,
    club: [...new Set(seasonsData.map(s=>s.club).filter(Boolean))].join(', ') || '—',
    niveau: [...new Set(seasonsData.map(s=>s.niveau).filter(Boolean))].join(', ') || '—',
    matchs_joues: sumKey(seasonsData,'matchs_joues'), matchs_equipe: sumKey(seasonsData,'matchs_equipe'), titularisations: sumKey(seasonsData,'titularisations'),
    buts: sumKey(seasonsData,'buts'), passes_decisives: sumKey(seasonsData,'passes_decisives'), buts_equipe: sumKey(seasonsData,'buts_equipe'),
    minutes_jouees: sumKey(seasonsData,'minutes_jouees'), cartons_jaunes: sumKey(seasonsData,'cartons_jaunes'),
    cartons_rouges: sumKey(seasonsData,'cartons_rouges'),
    impact_differentiel: avgKey(seasonsData,'impact_differentiel'), pct_matchs_avec_but: avgKey(seasonsData,'pct_matchs_avec_but'),
    points_avec: sumKey(seasonsData,'points_avec'), points_sans: sumKey(seasonsData,'points_sans'),
    pct_points_avec: avgKey(seasonsData,'pct_points_avec'), pct_points_sans: avgKey(seasonsData,'pct_points_sans'),
    vitesse_max_kmh: (() => { const v = seasonsData.map(s=>s.vitesse_max_kmh).filter(x=>x!=null); return v.length ? Math.max(...v) : null; })(),
    vma_kmh: avgKey(seasonsData,'vma_kmh'), distance_moyenne_km: avgKey(seasonsData,'distance_moyenne_km'),
    sprints_match: avgKey(seasonsData,'sprints_match'),
    buts_encaisses_avec: sumKey(seasonsData,'buts_encaisses_avec'), clean_sheets: sumKey(seasonsData,'clean_sheets'),
    preuve_gps_url: (seasonsData.find(s => s.preuve_gps_url) || {}).preuve_gps_url || null
  };

  function renderSeasonBlock(s) {
    const pct_tps = s.matchs_joues > 0 ? Math.round((s.minutes_jouees||0) / (s.matchs_joues * 90) * 100) : 0;
    const diff = s.impact_differentiel;
    const diffPct = diff == null ? 0 : Math.max(0, Math.min(100, 50 + diff * 50));
    const hasImpactData = s.impact_differentiel != null || s.pct_matchs_avec_but != null || s.points_avec != null;
    const hasGPS = s.vitesse_max_kmh != null || s.vma_kmh != null || s.distance_moyenne_km != null || s.sprints_match != null;
    const round1 = (v) => v == null ? v : Math.round(v*10)/10;
    const ratioButsMatch = s.matchs_joues > 0 ? (s.buts||0) / s.matchs_joues : null;
    const contribution = (s.buts||0) + (s.passes_decisives||0);
    const sIndex = seasonsData.findIndex(x => x.saison === s.saison);
    const prevSeason = (!s.isGlobal && sIndex >= 0) ? seasonsData[sIndex + 1] : null;
    const prevRatioButsMatch = (prevSeason && prevSeason.matchs_joues > 0) ? (prevSeason.buts||0) / prevSeason.matchs_joues : null;
    const evolutionPct = (ratioButsMatch != null && prevRatioButsMatch > 0) ? Math.round((ratioButsMatch - prevRatioButsMatch) / prevRatioButsMatch * 100) : null;
    const ratioMinBut = (s.buts > 0) ? Math.round((s.minutes_jouees||0) / s.buts) : null;
    const pctButsEquipe = (s.buts_equipe > 0) ? Math.round((s.buts||0) / s.buts_equipe * 100) : null;
    const matchsSaison = s.isGlobal ? Object.values(matchsBySaison).flat() : (matchsBySaison[s.saison] || []);
    const pctMatchsAvecBut = matchsSaison.length > 0 ? Math.round(matchsSaison.filter(m => (m.buts||0) > 0).length / matchsSaison.length * 100) : null;
    const ratioEncaissesMatch = (s.matchs_joues > 0 && s.buts_encaisses_avec != null) ? s.buts_encaisses_avec / s.matchs_joues : null;
    const pctCleanSheet = (s.titularisations > 0 && s.clean_sheets != null) ? Math.round(s.clean_sheets / s.titularisations * 100) : null;
    const ratioCartons = s.matchs_joues > 0 ? ((s.cartons_jaunes||0) + (s.cartons_rouges||0)) / s.matchs_joues : null;
    const tauxPresence = (s.matchs_equipe > 0) ? Math.round((s.matchs_joues||0) / s.matchs_equipe * 100) : null;
    const hasDefenseData = s.buts_encaisses_avec != null || s.clean_sheets != null;
    const hasRatios = (isDefensif ? (ratioEncaissesMatch != null || pctCleanSheet != null || ratioCartons != null) : (ratioButsMatch != null || contribution > 0 || ratioMinBut != null || pctButsEquipe != null || pctMatchsAvecBut != null)) || tauxPresence != null;

    return `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">${s.matchs_joues||0}</div><div class="stat-lbl">Matchs joués</div></div>
        ${isDefensif ? `
        <div class="stat-card"><div class="stat-val" style="color:var(--red)">${s.buts_encaisses_avec ?? '—'}</div><div class="stat-lbl">Buts encaissés</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--green-l)">${s.clean_sheets ?? '—'}</div><div class="stat-lbl">Clean sheets</div></div>
        ` : `
        <div class="stat-card"><div class="stat-val" style="color:var(--green-l)">${s.buts||0}</div><div class="stat-lbl">Buts</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--blue-l)">${s.passes_decisives||0}</div><div class="stat-lbl">Passes déc.</div></div>
        `}
        <div class="stat-card"><div class="stat-val">${s.minutes_jouees||0}</div><div class="stat-lbl">Minutes</div></div>
        <div class="stat-card"><div class="stat-val">${s.titularisations||0}</div><div class="stat-lbl">Titularisations</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--gold-l)">${s.cartons_jaunes||0}</div><div class="stat-lbl">Cartons jaunes</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--red)">${s.cartons_rouges||0}</div><div class="stat-lbl">Cartons rouges</div></div>
        <div class="stat-card"><div class="stat-val">${pct_tps}%</div><div class="stat-lbl">Temps de jeu</div></div>
      </div>

      ${!hasRatios ? '' : `
      <div class="section">
        <div class="section-title">Ratios & performance</div>
        <div class="ratio-grid">
          ${isDefensif ? ratioCardSorted([
            { displayVal: ratioEncaissesMatch != null ? ratioEncaissesMatch.toFixed(2) : null, label: 'Buts encaissés / match', rawValue: ratioEncaissesMatch, tiers: {elite:0.5, gold:1.0}, invert: true },
            { displayVal: pctCleanSheet != null ? pctCleanSheet+'%' : null, label: '% clean sheet (titularisations)', rawValue: pctCleanSheet, tiers: {elite:40, gold:30}, invert: false },
            { displayVal: ratioCartons != null ? ratioCartons.toFixed(2) : null, label: 'Cartons / match (discipline)', rawValue: ratioCartons, tiers: {elite:0.15, gold:0.30}, invert: true },
            { displayVal: tauxPresence != null ? tauxPresence+'%' : null, label: 'Taux de présence', rawValue: tauxPresence, tiers: {elite:85, gold:60}, invert: false },
          ]) : ratioCardSorted([
            { displayVal: ratioButsMatch != null ? ratioButsMatch.toFixed(2) : null, label: 'Buts / match', rawValue: ratioButsMatch, tiers: {elite:0.7, gold:0.4}, invert: false },
            { displayVal: pctMatchsAvecBut != null ? pctMatchsAvecBut+'%' : null, label: '% matchs avec but', rawValue: pctMatchsAvecBut, tiers: {elite:65, gold:40}, invert: false },
            { displayVal: ratioMinBut != null ? ratioMinBut+"'" : null, label: 'Minutes par but', rawValue: ratioMinBut, tiers: {elite:100, gold:200}, invert: true },
            { displayVal: contribution, label: 'Buts + passes décisives', rawValue: s.matchs_joues > 0 ? contribution / s.matchs_joues : null, tiers: {elite:1.0, gold:0.6}, invert: false, always: true },
            { displayVal: pctButsEquipe != null ? pctButsEquipe+'%' : null, label: "Part des buts de l'équipe", rawValue: pctButsEquipe, tiers: {elite:35, gold:20}, invert: false },
            { displayVal: tauxPresence != null ? tauxPresence+'%' : null, label: 'Taux de présence', rawValue: tauxPresence, tiers: {elite:85, gold:60}, invert: false },
          ])}
        </div>
        ${((!isDefensif && (pctButsEquipe == null || pctMatchsAvecBut == null)) || tauxPresence == null) ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:12px;">${(!isDefensif && pctMatchsAvecBut == null) ? 'Ajoute tes fiches de match pour débloquer le % de matchs avec but. ' : ''}${(!isDefensif && pctButsEquipe == null) ? 'Renseigne les buts marqués par l\'équipe cette saison pour débloquer la part des buts de l\'équipe. ' : ''}${tauxPresence == null ? 'Renseigne les matchs joués par l\'équipe cette saison (dans "Modifier mon profil") pour débloquer ton taux de présence.' : ''}</div>` : ''}
      </div>`}

      ${(evolutionPct != null && !isDefensif) ? `
      <div class="section">
        <div class="section-title">Évolution vs saison précédente</div>
        <div class="bar-item">
          <div class="bar-label-row"><span class="k">Buts/match : ${prevRatioButsMatch.toFixed(2)} (${prevSeason.saison}) → ${ratioButsMatch.toFixed(2)} (${s.saison})</span><span class="v" style="color:${evolutionTier(evolutionPct).color}">${evolutionPct>=0?'+':''}${evolutionPct}%</span></div>
        </div>
        <div style="font-size:0.78rem;color:${evolutionTier(evolutionPct).color};">${evolutionTier(evolutionPct).label}${(s.niveau && prevSeason.niveau && s.niveau !== prevSeason.niveau) ? ` (changement de niveau : ${prevSeason.niveau} → ${s.niveau})` : ''}</div>
      </div>` : ''}

      <div class="section">
        <div class="section-title">${s.isGlobal ? `Informations · cumul sur ${s.nbSaisons} saison${s.nbSaisons>1?'s':''}` : 'Informations'}</div>
        <div class="info-row"><span class="info-key">Club</span><span class="info-val">${s.club||'—'}</span></div>
        <div class="info-row"><span class="info-key">Niveau</span><span class="info-val">${s.niveau||'—'}</span></div>
        ${!s.isGlobal ? `<div class="info-row"><span class="info-key">Saison</span><span class="info-val">${s.saison}${s.isCurrent?' (actuelle)':''}</span></div>` : ''}
      </div>

      ${!hasImpactData ? '' : canImpact ? `
      <div class="section">
        <div class="section-title">Impact collectif</div>
        ${diff != null ? `
        <div class="bar-item">
          <div class="bar-label-row"><span class="k">Différentiel d'impact</span><span class="v" style="color:${impactTier(diff).color}">${diff>=0?'+':''}${Number(diff).toFixed(2)}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${diffPct}%;background:${impactTier(diff).color}"></div></div>
          <div style="font-size:0.75rem;color:${impactTier(diff).color};margin-top:6px;">${impactTier(diff).label}</div>
          <div style="font-size:0.68rem;color:var(--muted);margin-top:4px;">Points pris par l'équipe avec ce joueur vs sans lui — donnée historique, non auto-déclarable.</div>
        </div>` : ''}
        ${(!isDefensif && s.pct_matchs_avec_but != null) ? `
        <div class="bar-item">
          <div class="bar-label-row"><span class="k">% matchs avec but</span><span class="v" style="color:var(--gold-l)">${Math.round(s.pct_matchs_avec_but)}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,s.pct_matchs_avec_but)}%;background:var(--gold-l)"></div></div>
        </div>` : ''}
        ${s.points_avec != null && s.points_sans != null ? `
        <div class="info-row"><span class="info-key">Points pris avec le joueur</span><span class="info-val">${s.points_avec}${s.pct_points_avec!=null?' ('+Math.round(s.pct_points_avec)+'%)':''}</span></div>
        <div class="info-row"><span class="info-key">Points pris sans le joueur</span><span class="info-val">${s.points_sans}${s.pct_points_sans!=null?' ('+Math.round(s.pct_points_sans)+'%)':''}</span></div>` : ''}
      </div>` : `
      <div class="section">
        <div class="section-title">Impact collectif</div>
        <div class="locked-box">
          <p>🔒 Réservé aux recruteurs Pro et Premium</p>
          <a href="footlight-paiement.html?plan=pro"><button class="btn primary">Passer au plan Pro</button></a>
        </div>
      </div>`}

      ${!hasGPS ? '' : canGPS ? `
      <div class="section">
        <div class="section-title">Données GPS</div>
        <div class="stats-grid" style="margin-bottom:0;">
          ${s.vitesse_max_kmh!=null?`<div class="stat-card"><div class="stat-val" style="color:var(--gold-l)">${round1(s.vitesse_max_kmh)}</div><div class="stat-lbl">Vitesse max km/h</div></div>`:''}
          ${s.vma_kmh!=null?`<div class="stat-card"><div class="stat-val">${round1(s.vma_kmh)}</div><div class="stat-lbl">VMA km/h</div></div>`:''}
          ${s.distance_moyenne_km!=null?`<div class="stat-card"><div class="stat-val">${round1(s.distance_moyenne_km)}</div><div class="stat-lbl">Km/match moy.</div></div>`:''}
          ${s.sprints_match!=null?`<div class="stat-card"><div class="stat-val">${round1(s.sprints_match)}</div><div class="stat-lbl">Sprints/match</div></div>`:''}
        </div>
        ${s.preuve_gps_url ? `<a href="${s.preuve_gps_url}" target="_blank" style="display:inline-block;margin-top:10px;color:var(--blue-l);font-size:0.8rem;">📎 Voir la preuve fournie par le joueur</a>` : ''}
      </div>` : `
      <div class="section">
        <div class="section-title">Données GPS</div>
        <div class="locked-box">
          <p>🔒 Réservé aux recruteurs Premium</p>
          <a href="footlight-paiement.html?plan=premium"><button class="btn primary">Passer au plan Premium</button></a>
        </div>
      </div>`}

      ${(function() {
        const matchs = s.isGlobal
          ? Object.values(matchsBySaison).flat().sort((a,b) => (b.date_match||'').localeCompare(a.date_match||''))
          : (matchsBySaison[s.saison] || []);
        if (!matchs.length) return '';
        return `
        <div class="section">
          <div class="section-title">Historique des matchs${s.isGlobal ? ` · ${matchs.length} fiche${matchs.length>1?'s':''}` : ''}</div>
          <div style="display:flex;flex-direction:column;">
            ${matchs.map(m => {
              const bits = [];
              if (isDefensif) {
                if (m.buts_encaisses_avec != null) bits.push(`${m.buts_encaisses_avec} encaissé(s)`);
                if (m.clean_sheet) bits.push('clean sheet');
              } else {
                if (m.buts) bits.push(`${m.buts} but(s)`);
                if (m.passes_decisives) bits.push(`${m.passes_decisives} passe(s)`);
              }
              if (m.minutes_jouees) bits.push(`${m.minutes_jouees} min`);
              if (m.cartons_jaunes) bits.push(`${m.cartons_jaunes} 🟨`);
              if (m.cartons_rouges) bits.push(`${m.cartons_rouges} 🟥`);
              const lieu = m.domicile == null ? '' : (m.domicile ? ' (dom.)' : ' (ext.)');
              const score = (m.score_pour != null && m.score_contre != null) ? ` · ${m.score_pour}-${m.score_contre}` : '';
              return `
              <div style="padding:10px 0;border-bottom:1px solid var(--bg4);">
                <div style="font-size:0.85rem;">${m.date_match ? new Date(m.date_match).toLocaleDateString('fr-FR') + ' · ' : ''}${m.adversaire || 'Adversaire non précisé'}${lieu}${score}${s.isGlobal ? ` · ${m.saison}` : ''}</div>
                <div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">${bits.join(' · ') || '—'}${m.lien_match ? ` · <a href="${m.lien_match}" target="_blank" style="color:var(--blue-l);">🔗 voir le match</a>` : ''}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      })()}
    `;
  }

  const html = `
    <div class="profile-header">
      <div class="profile-avatar" style="background:linear-gradient(135deg,${couleur},${couleur}88)">${initiales}</div>
      <div style="flex:1">
        <div class="profile-name">${j.prenom} ${j.nom}</div>
        <div class="profile-tags">
          <span class="tag blue">${poste_raw.replace(/_/g,' ')}</span>
          <span class="tag">${j.club||'—'}</span>
          <span class="tag">${j.niveau||'—'}</span>
          ${j.pied_fort ? `<span class="tag">Pied ${j.pied_fort}</span>` : ''}
          <span class="tag ${j.badge==='elite'?'gold':j.badge==='video'||j.badge==='gps'?'green':''}">${BADGES[j.badge]||'⚪ Déclaratif'}</span>
        </div>
        ${j.bio ? `<div style="font-size:0.85rem;color:var(--muted);line-height:1.6;">${j.bio}</div>` : ''}
        ${isOwner ? `<div class="btn-row no-print"><button class="btn primary" onclick="window.location.href='footlight-modifier-profil.html'">Modifier mon profil</button><button class="btn outline" onclick="window.location.href='footlight-recap-saison.html'">📄 Récap de ma saison</button></div>` : ''}
        ${(!isOwner && viewerRole === 'recruteur') ? `<div class="btn-row no-print"><button class="btn outline" onclick="window.location.href='footlight-modifier-profil.html?id=${j.id}'">✏️ Compléter ce profil</button></div>` : ''}
        ${canExport ? `<div class="btn-row no-print"><button class="btn outline" onclick="window.print()">📄 Télécharger la fiche (PDF)</button></div>` : ''}
        ${(!isOwner && viewerRole === 'recruteur' && viewerPlan !== 'premium') ? `<div class="btn-row no-print"><a href="footlight-paiement.html?plan=premium" style="font-size:0.78rem;color:var(--blue-l);align-self:center;">🔒 Export PDF réservé au plan Premium</a></div>` : ''}
      </div>
    </div>

    ${(historique.length > 0 && canHistory) ? `
    <div class="season-select-row no-print">
      <label for="season-select">Saison</label>
      <select id="season-select" class="season-select">
        ${seasonsData.map(s => `<option value="${s.saison}" ${s.isCurrent?'selected':''}>${s.saison}${s.isCurrent?' (actuelle)':''}</option>`).join('')}
        <option value="global">🌐 Toutes les saisons (cumul)</option>
      </select>
    </div>` : ''}
    ${(historique.length > 0 && !canHistory) ? `
    <div class="season-select-row no-print" style="justify-content:space-between;">
      <span style="font-size:0.78rem;color:var(--muted);">Saison actuelle uniquement</span>
      <a href="footlight-paiement.html?plan=pro" style="font-size:0.78rem;color:var(--blue-l);">🔒 Historique complet réservé aux recruteurs Pro et Premium</a>
    </div>` : ''}

    <div id="season-block">${renderSeasonBlock(currentSeason)}</div>

    <div class="section">
      <div class="section-title">Profil</div>
      <div class="info-row"><span class="info-key">Poste</span><span class="info-val">${poste_raw.replace(/_/g,' ')}</span></div>
      ${j.poste_secondaire ? `<div class="info-row"><span class="info-key">Poste secondaire</span><span class="info-val">${j.poste_secondaire.replace(/_/g,' ')}</span></div>` : ''}
      <div class="info-row"><span class="info-key">Pied fort</span><span class="info-val">${j.pied_fort||'—'}</span></div>
      ${j.taille ? `<div class="info-row"><span class="info-key">Taille</span><span class="info-val">${j.taille} cm</span></div>` : ''}
      ${j.poids ? `<div class="info-row"><span class="info-key">Poids</span><span class="info-val">${j.poids} kg</span></div>` : ''}
      ${j.nationalite ? `<div class="info-row"><span class="info-key">Nationalité</span><span class="info-val">${j.nationalite}</span></div>` : ''}
    </div>

    ${(!isOwner && viewerRole === 'recruteur') ? `
    <div class="section">
      <div class="section-title">Coordonnées</div>
      ${viewerPlan === 'premium' ? `
      <div class="info-row"><span class="info-key">${j.telephone ? 'Téléphone' : 'Email'}</span><span class="info-val">${j.telephone || j.email || '—'}</span></div>
      ${j.telephone && j.email ? `<div class="info-row"><span class="info-key">Email</span><span class="info-val">${j.email}</span></div>` : ''}
      ` : `
      <div class="locked-box">
        <p>🔒 Réservé aux recruteurs Premium</p>
        <a href="footlight-paiement.html?plan=premium"><button class="btn primary">Passer au plan Premium</button></a>
      </div>
      `}
    </div>` : ''}

    ${(j.points_forts && j.points_forts.length) ? `
    <div class="section">
      <div class="section-title">Points forts</div>
      ${j.points_forts.map(p => `
      <div class="info-row">
        <span class="info-key">${p.label}</span>
        ${p.video_url ? `<a href="${p.video_url}" target="_blank" style="color:var(--blue-l);font-size:0.82rem;">🎥 Voir la vidéo →</a>` : `<span class="info-val">—</span>`}
      </div>`).join('')}
    </div>` : ''}

    ${j.points_amelioration ? `
    <div class="section">
      <div class="section-title">Points d'amélioration</div>
      <div style="font-size:0.85rem;color:var(--muted);line-height:1.6;">${j.points_amelioration}</div>
    </div>` : ''}

    ${(function() {
      const links = (j.video_urls && j.video_urls.length) ? j.video_urls : (j.video_url ? [j.video_url] : []);
      if (!links.length) return '';
      if (isOwner || (viewerRole === 'recruteur' && viewerPlan === 'premium')) {
        return `
        <div class="section">
          <div class="section-title">Vidéo${links.length > 1 ? 's' : ''} de match</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${links.map((l,i) => `<a href="${l}" target="_blank" style="color:var(--blue-l);font-size:0.85rem;">🎥 ${links.length > 1 ? `Vidéo ${i+1}` : 'Voir la vidéo'} →</a>`).join('')}
          </div>
        </div>`;
      }
      return `
        <div class="section">
          <div class="section-title">Vidéo${links.length > 1 ? 's' : ''} de match</div>
          <div class="locked-box">
            <p>🔒 Réservé aux recruteurs Premium</p>
            <a href="footlight-paiement.html?plan=premium"><button class="btn primary">Passer au plan Premium</button></a>
          </div>
        </div>`;
    })()}

    <div class="section">
      <div class="section-title">Badge de validation</div>
      <div style="font-size:1.5rem;margin-bottom:8px">${BADGES[j.badge]||'⚪ Déclaratif'}</div>
      <div style="font-size:0.8rem;color:var(--muted)">
        ${j.badge==='declaratif' ? 'Stats déclarées par le joueur. Uploadez une vidéo pour améliorer votre badge.' : ''}
        ${j.badge==='video' ? 'Vidéo de match validée.' : ''}
        ${j.badge==='gps' ? 'Données GPS connectées.' : ''}
        ${j.badge==='elite' ? 'Badge Elite — 2 saisons validées.' : ''}
      </div>
    </div>
  `;

  document.getElementById('profil-content').innerHTML = html;
  document.getElementById('profil-content').style.display = 'block';
  document.title = `FootLight — ${j.prenom} ${j.nom}`;

  const seasonSelect = document.getElementById('season-select');
  if (seasonSelect) {
    seasonSelect.addEventListener('change', () => {
      const val = seasonSelect.value;
      const s = val === 'global' ? globalSeason : (seasonsData.find(x => x.saison === val) || currentSeason);
      document.getElementById('season-block').innerHTML = renderSeasonBlock(s);
    });
  }
}

loadProfil();
</script>
</body>
</html>
