<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FootLight — Nouveau mot de passe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#07090e;--bg2:#0d1017;--bg3:#141820;--border:rgba(255,255,255,0.08);--text:#f0f2f7;--muted:#5a6275;--blue:#4f8ef7;--green:#2dd882;--red:#f74f4f;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:420px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4f8ef7,#7c6af7);}
.logo{font-size:1.2rem;font-weight:800;background:linear-gradient(90deg,#4f8ef7,#7c6af7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px;display:block;text-align:center;}
h2{font-size:1.3rem;font-weight:700;margin-bottom:6px;text-align:center;}
.sub{font-size:0.83rem;color:var(--muted);text-align:center;margin-bottom:24px;}
.field{margin-bottom:14px;}
.fl{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;}
.fi{width:100%;padding:13px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:0.92rem;outline:none;}
.fi:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--muted);}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#4f8ef7,#7c6af7);color:#fff;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:8px;}
.btn:disabled{opacity:0.5;}
.msg{padding:12px 16px;border-radius:10px;font-size:0.82rem;margin-top:14px;display:none;}
.msg.success{background:rgba(45,216,130,0.1);border:1px solid rgba(45,216,130,0.3);color:var(--green);}
.msg.error{background:rgba(247,79,79,0.1);border:1px solid rgba(247,79,79,0.3);color:var(--red);}
.msg.show{display:block;}
.back{display:block;text-align:center;margin-top:16px;font-size:0.82rem;color:var(--muted);text-decoration:none;}
.back:hover{color:var(--text);}
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo">FootLight</a>
  <h2>Nouveau mot de passe</h2>
  <p class="sub">Choisissez un nouveau mot de passe pour votre compte.</p>

  <div id="form-section">
    <div class="field">
      <div class="fl">Nouveau mot de passe</div>
      <input class="fi" type="password" id="pass1" placeholder="8 caractères minimum"/>
    </div>
    <div class="field">
      <div class="fl">Confirmer le mot de passe</div>
      <input class="fi" type="password" id="pass2" placeholder="Répétez le mot de passe"/>
    </div>
    <button class="btn" id="btn" onclick="resetPassword()">Enregistrer le nouveau mot de passe</button>
    <div class="msg" id="msg"></div>
  </div>

  <a href="footlight-connexion.html" class="back">← Retour à la connexion</a>
</div>

<script>
const SUPABASE_URL = 'https://migarohddystlyhuoxfg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pZ2Fyb2hkZHlzdGx5aHVveGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjI2NjksImV4cCI6MjA5Mjk5ODY2OX0.NKlySSVpnws5WZF41T2qeoMjBi5VZzpnk_h-ejTj9R4';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Récupérer le token depuis l'URL
const hash = window.location.hash;
const params = new URLSearchParams(hash.substring(1));
const accessToken = params.get('access_token');
const type = params.get('type');

if (!accessToken || type !== 'recovery') {
  document.getElementById('form-section').innerHTML = '<p style="color:var(--red);text-align:center;">Lien invalide ou expiré.<br>Demandez un nouveau lien de réinitialisation.</p>';
} else {
  // Définir la session avec le token
  db.auth.setSession({ access_token: accessToken, refresh_token: params.get('refresh_token') || '' });
}

async function resetPassword() {
  const pass1 = document.getElementById('pass1').value;
  const pass2 = document.getElementById('pass2').value;
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');

  if (pass1.length < 8) {
    showMsg('Le mot de passe doit contenir au moins 8 caractères.', 'error');
    return;
  }
  if (pass1 !== pass2) {
    showMsg('Les mots de passe ne correspondent pas.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enregistrement...';

  const { error } = await db.auth.updateUser({ password: pass1 });

  if (error) {
    showMsg('Erreur : ' + error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Enregistrer le nouveau mot de passe';
  } else {
    showMsg('✅ Mot de passe mis à jour ! Redirection...', 'success');
    setTimeout(() => window.location.href = 'footlight-connexion.html', 2000);
  }
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type + ' show';
}
</script>
</body>
</html>
